model_list:
  - model_name: nova-2-lite
    litellm_params:
      model: bedrock/global.amazon.nova-2-lite-v1:0
      aws_region_name: "us-east-1"
      drop_params: true

  - model_name: minimax-m2.5
    litellm_params:
      model: bedrock/minimax.minimax-m2.5
      aws_region_name: "us-east-1"      
      drop_params: true

  - model_name: kimi-k2.5
    litellm_params:
      model: bedrock/moonshotai.kimi-k2.5
      aws_region_name: "us-east-1"      
      drop_params: true

  # Azure OpenAI Configuration (gpt-5.2, gpt-5.4*, gpt-5.6*)
  - model_name: gpt-5.2
    model_info:
      base_model: gpt-5.2
    litellm_params:
      model: azure/gpt-5.2
      api_base: "os.environ/AZURE_API_BASE"
      api_key: "os.environ/AZURE_API_KEY"
      api_version: "2024-08-01-preview"
      drop_params: true

  - model_name: gpt-5.4-mini
    model_info:
      base_model: gpt-5.4-mini
    litellm_params:
      model: azure/gpt-5.4-mini
      api_base: "os.environ/AZURE_API_BASE"
      api_key: "os.environ/AZURE_API_KEY"
      api_version: "2024-08-01-preview"
      drop_params: true      

  - model_name: gpt-5.4-nano
    model_info:
      base_model: gpt-5.4-nano
    litellm_params:
